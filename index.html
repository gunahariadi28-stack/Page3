<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLIPONI Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4f6fb;
}

.banner img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-bottom:15px;
}

h2{margin-bottom:15px}

.counter{
  display:flex;
  align-items:center;
  gap:10px;
}

.counter button{
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:#2d4cc8;
  color:white;
  cursor:pointer;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:12px;
  display:flex;
  gap:10px;
  box-shadow:0 -5px 15px rgba(0,0,0,0.05);
}

button.main{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2d4cc8;
  color:white;
  font-weight:700;
  cursor:pointer;
}

button.secondary{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#e5e7eb;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="banner">
<img src="https://via.placeholder.com/1200x400?text=POLIPONI+EVENT">
</div>

<div class="container">

<h2>🎟️ Pilih Tiket</h2>

<div class="card">
<b>Premium</b>
<div>Rp450.000</div>
<div class="counter">
<button onclick="minus('p')">-</button>
<span id="p">0</span>
<button onclick="plus('p')">+</button>
</div>
</div>

<div class="card">
<b>Fast Track</b>
<div>Rp625.000</div>
<div class="counter">
<button onclick="minus('f')">-</button>
<span id="f">0</span>
<button onclick="plus('f')">+</button>
</div>
</div>

<div class="card">
<b>Total:</b> <span id="total">Rp0</span>
</div>

</div>

<div class="footer">
<button class="main" onclick="checkout()">Checkout</button>
<button class="secondary" onclick="go()">Festival</button>
</div>

<script>
let p=0,f=0;

function rupiah(n){
  return "Rp"+n.toLocaleString("id-ID");
}

function plus(t){
  if(t==='p') p++;
  if(t==='f') f++;
  update();
}

function minus(t){
  if(t==='p'&&p>0)p--;
  if(t==='f'&&f>0)f--;
  update();
}

function update(){
  document.getElementById("p").innerText=p;
  document.getElementById("f").innerText=f;

  let total=(p*450000)+(f*625000);
  document.getElementById("total").innerText=rupiah(total);
}

function checkout(){
  if(p+f===0){
    alert("Pilih tiket dulu");
    return;
  }
  alert("Masuk ke checkout (bisa kamu upgrade nanti)");
}

function go(){
  window.location.href="https://hariadig68-wq.github.io/Festival/";
}
</script>

</body>
</html>
