<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLIPONI Ticketing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2d4cc8;
  --bg:#f4f6fb;
  --text:#111827;
  --white:#fff;
  --shadow:0 10px 25px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
}

/* PAGE */
.page{display:none;}
.page.active{display:block}

/* BANNER */
.banner img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:var(--shadow);
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* COUNTER */
.counter{
  display:flex;
  gap:10px;
  align-items:center;
}

.counter button{
  width:35px;height:35px;
  border-radius:50%;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
}

/* TEXT */
h2{margin-bottom:15px}
.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- ================= HALAMAN 1 ================= -->
<div id="page1" class="page active">

<div class="banner">
<img src="https://via.placeholder.com/1200x400?text=POLIPONI+EVENT">
</div>

<div class="container">
<h2>🎟️ Pilih Tiket</h2>

<div class="card">
<b>Reguler Premium</b>
<div>Rp450.000</div>
<div class="counter">
<button onclick="dec('premium')">-</button>
<span id="premium">0</span>
<button onclick="inc('premium')">+</button>
</div>
</div>

<div class="card">
<b>Fast Track</b>
<div>Rp625.000</div>
<div class="counter">
<button onclick="dec('fast')">-</button>
<span id="fast">0</span>
<button onclick="inc('fast')">+</button>
</div>
</div>

<div class="card">
<div class="row"><span>Total</span><b id="total">Rp0</b></div>
</div>

</div>

<div class="footer">
<button onclick="lanjut()">Selanjutnya</button>
</div>

</div>

<!-- ================= HALAMAN 2 ================= -->
<div id="page2" class="page">

<div class="container">
<h2>🧾 Checkout</h2>

<div class="card">
<div class="row"><span>Premium</span><span id="cPremium"></span></div>
<div class="row"><span>Fast Track</span><span id="cFast"></span></div>
<hr>
<div class="row"><b>Total</b><b id="cTotal"></b></div>
</div>

<button onclick="bayar()">Bayar Sekarang</button>
<button onclick="kembali()" style="margin-top:10px;background:#ccc;color:#000">
Kembali
</button>

</div>

</div>

<script>
let data = {premium:0, fast:0};

const price = {
  premium:450000,
  fast:625000
};

function rupiah(n){
  return "Rp" + n.toLocaleString("id-ID");
}

function inc(type){
  data[type]++;
  update();
}

function dec(type){
  if(data[type]>0){
    data[type]--;
    update();
  }
}

function update(){
  document.getElementById("premium").innerText = data.premium;
  document.getElementById("fast").innerText = data.fast;

  let total = (data.premium*price.premium)+(data.fast*price.fast);
  document.getElementById("total").innerText = rupiah(total);
}

function lanjut(){
  let total = (data.premium*price.premium)+(data.fast*price.fast);

  if(total === 0){
    alert("Pilih tiket dulu");
    return;
  }

  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.add("active");

  document.getElementById("cPremium").innerText = data.premium;
  document.getElementById("cFast").innerText = data.fast;
  document.getElementById("cTotal").innerText = rupiah(total);
}

function kembali(){
  document.getElementById("page2").classList.remove("active");
  document.getElementById("page1").classList.add("active");
}

function bayar(){
  alert("Pembayaran berhasil (demo)");
}
</script>

</body>
</html>
